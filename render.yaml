services:
  # 1. FastAPI Backend (Web Service)
  - type: web
    name: reliefsync-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 2. React/Vite Frontend (Static Site)
  - type: web
    name: reliefsync-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: reliefsync-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_IMGBB_API_KEY
        sync: false
